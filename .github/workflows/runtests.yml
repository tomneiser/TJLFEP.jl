name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

# Note: TJLFEP hard-depends on the full FUSE stack (FUSE/IMAS/TurbulentTransport/CUDA),
# so the first cold run instantiates a large dependency graph (slow). julia-actions/cache
# persists the depot across runs to amortize this. The regression itself runs ONE scan
# radius on CPU (TJLFEP_FILE_ONLY=1) and takes several minutes.
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - "1.11"
        os:
          - ubuntu-latest
    env:
      TJLFEP_FILE_ONLY: "1"
      JULIA_NUM_THREADS: "4"

    steps:
      # TJLF >= 1.2.12 (registered in FuseRegistry) provides the batched eigensolvers
      # (SIConfig/ContourConfig/CertifiedSIConfig, *_eigvals_batch, _EIGSOLVE_HOOK) and
      # the TJLFCUDAExt/TJLFForwardDiffExt extensions TJLFEP relies on, so it is
      # resolved straight from the registry — no sibling path checkout needed.
      - uses: actions/checkout@v4
        with:
          path: TJLFEP

      - uses: julia-actions/setup-julia@latest
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      - name: Add FuseRegistry
        run: |
          rm -rf ~/.julia/registries/FuseRegistry
          julia -e 'using Pkg; Pkg.Registry.add(RegistrySpec(url="https://github.com/ProjectTorreyPines/FuseRegistry.jl.git")); Pkg.Registry.add("General"); Pkg.Registry.update()'

      - name: Replace git@github.com with https in Package.toml files
        run: |
          find ~/.julia/registries/FuseRegistry -type f -name 'Package.toml' -exec sed -i 's|git@github.com:|https://project-torrey-pines:${{secrets.PTP_READ_TOKEN}}@github.com/|g' {} +

      - name: Instantiate
        working-directory: TJLFEP
        run: julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.precompile()'

      # Coverage is OFF unless --code-coverage is passed. `user` instruments the
      # package source so .cov files land under TJLFEP/src/ for processcoverage below.
      - name: Run regression tests
        working-directory: TJLFEP
        run: julia --project=. -t ${JULIA_NUM_THREADS} --code-coverage=user test/runtests.jl

      # processcoverage runs at the workspace ROOT (no working-directory on uses
      # steps), but the package was checked out under TJLFEP/ and tested there,
      # so the .cov files are in TJLFEP/src/ — point it there, not at src/.
      # src/ only: the TJLFEPIMASExt extension under ext/ is not loaded in
      # FILE_ONLY mode, so including it would report it as 0% covered.
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: TJLFEP/src

      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
